{{- if and (eq (include "sidecar-injector.clientHashSeed.autogenEnabled" .) "true") .Values.inspector.clientHashSeed.purgeOnUninstall }}
{{- $purgeName := printf "%s-seed-purge" (include "sidecar-injector.fullname" .) | trunc 63 | trimSuffix "-" }}
# Opt-in pre-delete hook: deletes every autogenerated client-hash seed Secret
# (source + per-namespace copies) on `helm uninstall`. Disabled by default so the
# seed — which keys all historical attacker correlation — survives uninstall.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $purgeName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed,before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $purgeName }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed,before-hook-creation
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $purgeName }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed,before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $purgeName }}
subjects:
- kind: ServiceAccount
  name: {{ $purgeName }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $purgeName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sidecar-injector.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: hook-succeeded,hook-failed,before-hook-creation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "sidecar-injector.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $purgeName }}
      {{- with .Values.webhookinjector.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.webhookinjector.podSecurityContext | nindent 8 }}
      containers:
        - name: seed-purge
          image: "{{ .Values.webhookinjector.image.repository }}"
          imagePullPolicy: {{ .Values.webhookinjector.image.pullPolicy }}
          args: ["purge-client-hash-seeds"]
          securityContext:
            {{- toYaml .Values.webhookinjector.securityContext | nindent 12 }}
          env:
          # Scope the purge to this release's seeds so uninstalling one injector
          # release never deletes another release's autogenerated seeds.
          - name: WEBHOOK-INJECTOR_HELM-RELEASE
            value: "{{ .Release.Name }}"
          - name: WEBHOOK-INJECTOR_LOG_LEVEL
            value: "{{ .Values.webhookinjector.logLevel }}"
          - name: WEBHOOK-INJECTOR_LOG_FORMAT
            value: "{{ .Values.webhookinjector.logFormat }}"
{{- end }}
